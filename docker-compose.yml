services:
  justiceai:
    build: .
    container_name: justiceai
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # Persist data, indexes, and model cache across container restarts
      - ./data:/app/data
      - ./indexes:/app/indexes
      - ./.cache:/app/.cache
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  hf_cache:
    driver: local
