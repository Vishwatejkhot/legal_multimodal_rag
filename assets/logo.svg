<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <!-- Background -->
  <rect width="520" height="140" rx="16" fill="#1B2B6B"/>

  <!-- Scales of justice icon -->
  <!-- Central pillar -->
  <rect x="54" y="38" width="4" height="68" rx="2" fill="#C9A227"/>
  <!-- Base -->
  <rect x="36" y="104" width="40" height="6" rx="3" fill="#C9A227"/>
  <!-- Top crossbar -->
  <rect x="24" y="40" width="64" height="4" rx="2" fill="#C9A227"/>
  <!-- Center knob -->
  <circle cx="56" cy="38" r="5" fill="#C9A227"/>

  <!-- Left pan chain -->
  <line x1="32" y1="44" x2="28" y2="72" stroke="#C9A227" stroke-width="2"/>
  <line x1="32" y1="44" x2="36" y2="72" stroke="#C9A227" stroke-width="2"/>
  <!-- Left pan -->
  <path d="M22 72 Q28 82 34 72" stroke="#C9A227" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Right pan chain -->
  <line x1="80" y1="44" x2="76" y2="68" stroke="#C9A227" stroke-width="2"/>
  <line x1="80" y1="44" x2="84" y2="68" stroke="#C9A227" stroke-width="2"/>
  <!-- Right pan (slightly lower = unbalanced) -->
  <path d="M70 74 Q78 84 86 74" stroke="#C9A227" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- JusticeAI text -->
  <text x="120" y="72" font-family="Georgia, serif" font-size="44" font-weight="700" fill="white" letter-spacing="-1">Justice</text>
  <text x="338" y="72" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#C9A227" letter-spacing="-1">AI</text>

  <!-- Tagline -->
  <text x="120" y="100" font-family="Arial, sans-serif" font-size="14" fill="#93C5FD" letter-spacing="0.5">Multimodal RAG  ·  UK Legal Evidence Analysis</text>

  <!-- Version badge -->
  <rect x="120" y="110" width="60" height="18" rx="9" fill="#C9A227" opacity="0.2"/>
  <text x="150" y="123" font-family="Arial, sans-serif" font-size="11" fill="#C9A227" text-anchor="middle" font-weight="600">v1.0.0</text>
</svg>
